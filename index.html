<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>with!大喜利</title>

    <link rel="icon" href="favicon.png" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Dela+Gothic+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <meta property="og:title" content="with!大喜利">
    <meta property="og:type" content="website">
    <meta property="og:description" content="友だちとボケて笑い合おう！完全無料のオンライン大喜利ゲーム！">
    <meta property="og:url" content="https://zetsubouinu.github.io/ZetsubouInu/">
    <meta property="og:image" content="https://zetsubouinu.github.io/ZetsubouInu/OGP.png">
    <meta property="og:site_name" content="with!大喜利">
    
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="with!大喜利">
    <meta name="twitter:description" content="友だちとボケて笑い合おう！完全無料のオンライン大喜利ゲーム！">
    <meta name="twitter:image" content="https://zetsubouinu.github.io/ZetsubouInu/OGP.png">
</head>
<body>

    <div id="countdown-overlay">
        <div id="countdown-text">3</div>
    </div>

    <div id="volume-wrapper">
        <button id="volume-toggle-btn">🔊</button>
        <div id="volume-panel">
            <div class="volume-control">
                <label>🎵 BGM</label>
                <input type="range" id="bgm-volume" min="0" max="1" step="0.01" value="0.4">
            </div>
            <div class="volume-control">
                <label>🔊 SE</label>
                <input type="range" id="se-volume" min="0" max="1" step="0.01" value="0.4">
            </div>
        </div>
    </div>

    <div id="screen-home" class="screen active">
        <img src="Logo.png" alt="with!大喜利" class="main-logo">
        <input type="text" id="name-input" placeholder="名前を入力（10文字まで）" maxlength="10">
        <p style="font-weight: bold;">アイコンを選択:</p>
        <div class="icon-selector" id="home-icon-selector"></div>
        <button id="create-room-btn">新しい部屋を作る</button>
        <hr style="border: 0; border-top: 2px solid #eee; margin: 30px 0;">
        <input type="text" id="room-input" placeholder="5桁のコードを入力">
        <button id="join-room-btn">部屋に入る</button>
        
        <div class="footer-text">
            <a href="terms.html" class="footer-link">利用規約</a> | 
            <a href="privacy.html" class="footer-link">プライバシーポリシー</a> | 
            <a href="QA.html" class="footer-link">よくある質問</a> | 
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSerejBEpNYMoTBTU036IRCy5PAKB6ekz9HhycDnFnNl-SsagQ/viewform?usp=preview" class="footer-link" target="_blank" rel="noopener noreferrer">お問い合わせ</a><br>
            © 2026 with!大喜利
        </div>
    </div>

    <div id="screen-wait" class="screen">
        <h1>待機室</h1>
        <p id="host-msg" style="display:none; color: #ff4d4d; font-weight: bold; margin-top: -10px;">👑 あなたがホストです</p>
        
        <p>ルームコード: <span id="display-code" style="font-size: 24px; font-weight: bold; cursor: pointer; background: #eee; padding: 2px 10px; border-radius: 5px;">*****</span>
        <button id="copy-btn" class="copy-btn">コピー</button></p>
        <div style="font-weight: bold; margin-bottom: 10px; text-align: right;">参加中：<span id="user-counter">0/8</span></div>
        <div class="user-list" id="user-list"></div>
        <div style="margin-top: 20px;">
            <button id="ready-btn">準備完了！</button>
            <button id="start-btn-container" style="display:none; margin-top: 10px;" disabled>ゲーム開始！</button>
            <button id="wait-exit-btn" class="exit-btn">退出する</button>
        </div>
        <div id="room-settings-area" style="display:none; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px;">
            <p id="settings-title" style="font-weight: bold; margin-bottom: 5px;">ルーム設定</p>
            <p id="guest-msg" style="display:none; color: #ff4d4d; font-size: 14px; margin-top: 0; margin-bottom: 15px;">※設定はホストのみ変更できます</p>
            <label style="font-weight: bold;">最大参加人数 (2〜8人):</label><br>
            <select id="max-users-select">
                <option value="2">2人</option><option value="3">3人</option><option value="4">4人</option><option value="5">5人</option><option value="6">6人</option><option value="7">7人</option><option value="8" selected>8人</option>
            </select><br>
            <label style="font-weight: bold;">回答時間:</label><br>
            <select id="time-select">
                <option value="30">30秒</option><option value="60" selected>60秒</option><option value="120">120秒</option>
            </select><br>
            <label style="font-weight: bold;">お題の数 (1〜10問):</label><br>
            <select id="round-select"></select>
            <p id="start-condition-msg" style="color:#1a1a1a; font-size: 14px; margin-top: 10px;">全員が準備完了になると開始できます</p>
        </div>
    </div>

    <div id="screen-playing" class="screen">
        <div style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px;">
            <span id="round-display">第 - ラウンド</span>
            <span id="timer-display" style="color: #1a1a1a;">残り --秒</span>
        </div>
        <div class="odai-box" id="current-odai">お題を取得中...</div>
        <input type="text" id="my-answer" placeholder="ボケを入力！（100文字まで）" maxlength="100">
        <button id="submit-btn">回答を送信</button>
        <p id="playing-wait-msg" style="display:none; font-weight: bold; color: #666;">送信完了！他の人を待っています...</p>
        <div class="stamp-area" id="playing-stamps"></div>
    </div>

    <div id="screen-revealing" class="screen">
        <h1>発表！</h1>
        <div id="revealing-odai" class="sub-odai-box"></div>
        <div id="answer-display">
            <span id="answer-display-inner"></span>
        </div>
        
        <div id="reveal-timer-display" style="text-align: right; font-size: 16px; color: #666; font-weight: bold; margin-top: -10px; margin-bottom: 15px; display: none;"></div>
        
        <p id="author-name"></p>
        <button id="next-reveal-btn" class="next-btn" style="display:none;">次の回答へ</button>
        <div class="stamp-area" id="revealing-stamps"></div>
    </div>

    <div id="screen-voting" class="screen">
        <h1>投票！</h1>
        <div id="voting-odai" class="sub-odai-box"></div>
        <p>一番面白いと思った回答を選んでください</p>
        <div id="vote-list"></div>
        <p id="vote-wait-msg" style="display:none;">全員の投票を待っています...</p>
    </div>

    <div id="screen-result" class="screen">
        <h1>最終結果発表</h1>
        <div id="mvp-area" class="mvp-container">
            <div class="mvp-label">🏆 今回のMVP 🏆</div>
            <div id="mvp-odai" class="mvp-odai">お題: ...</div>
            <div id="mvp-answer" class="mvp-answer">...</div>
            <div id="mvp-author" class="mvp-author">...</div>
        </div>
        <div id="result-list"></div>
        <button id="share-x-btn" class="share-btn">結果をXにシェア</button>
        <button id="back-to-wait-btn">待機室に戻る</button>
        <button id="exit-game-btn" class="exit-btn">ゲームをやめる</button>
        <div class="stamp-area" id="result-stamps"></div>
    </div>

    <div id="copy-toast">コピー完了</div>
    <div id="bottom-users" class="bottom-users" style="display:none;"></div>

    <script type="module" src="script.js"></script>
</body>
</html>
