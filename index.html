<head>

    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #fffbe6; text-align: center; margin: 0; padding: 20px; padding-bottom: 120px; color: #1a1a1a; }
        .screen { display: none; max-width: 600px; margin: auto; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 15px 35px rgba(0,0,0,0.05); border: 2px solid #eee; }
        .active { display: block; }
        .main-logo { display: block; max-width: 100%; height: auto; margin: 0 auto 30px; }
        .odai-box { font-size: 26px; font-weight: bold; padding: 30px; border: 4px solid #1a1a1a; border-radius: 20px; margin: 30px 0; background: #ffd700; box-shadow: 4px 4px 0 #1a1a1a; }
        
        .sub-odai-box { font-size: 18px; font-weight: bold; padding: 15px; border: 2px solid #1a1a1a; border-radius: 15px; margin-bottom: 20px; background: #fffbe6; }

        input, select { padding: 15px; font-size: 18px; border-radius: 50px; border: 2px solid #ddd; width: 85%; margin: 10px 0; outline: none; transition: 0.3s; }
        button { background: #1a1a1a; color: #ffd700; border: none; padding: 15px 30px; font-size: 20px; font-weight: bold; border-radius: 50px; cursor: pointer; transition: 0.3s; width: 90%; margin-bottom: 10px; }
        button:hover { background: #333; transform: translateY(-2px); }
        button:disabled { background: #ccc; color: #fff; cursor: not-allowed; transform: none; }
        
        .exit-btn { background: #ff4d4d; color: white; margin-top: 10px; }
        .exit-btn:hover { background: #ff3333; }

        .icon-selector { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .icon-option { font-size: 32px; cursor: pointer; padding: 15px; border: 3px solid transparent; border-radius: 20px; background: #f9f9f9; transition: 0.2s; }
        .icon-option.selected { border-color: #ffd700; background: #fffbe6; transform: scale(1.1); }
        
        .user-list { text-align: left; background: #f9f9f9; padding: 20px; border-radius: 20px; min-height: 50px; border: 1px solid #eee; }
        .user-entry { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: solid 1px #eee; }
        .status-badge { font-size: 12px; padding: 4px 8px; border-radius: 10px; font-weight: bold; }
        
        .status-ready { background: #ffd700; color: #1a1a1a; }
        .status-wait { background: #eee; color: #999; }

        .copy-btn { width: auto; padding: 5px 15px; font-size: 14px; margin-left: 10px; background: #1a1a1a; color: #ffd700; vertical-align: middle; }

        #copy-toast {
            visibility: hidden; min-width: 200px; background-color: #333; color: #ffd700; text-align: center;
            border-radius: 50px; padding: 10px; position: fixed; z-index: 1000; left: 50%; bottom: 100px;
            transform: translateX(-50%); font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #copy-toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 1.5s; }

        @keyframes fadein { from {bottom: 80px; opacity: 0;} to {bottom: 100px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 100px; opacity: 1;} to {bottom: 80px; opacity: 0;} }

        .bottom-users { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 500px; background: rgba(26,26,26,0.9); color: #ffd700; display: flex; justify-content: center; padding: 15px; border-radius: 100px; gap: 20px; z-index: 100; box-shadow: 0 10px 30px rgba(0,0,0,0.2); backdrop-filter: blur(10px); }
        .user-icon-stack { position: relative; display: flex; flex-direction: column; align-items: center; font-size: 12px; font-weight: bold; }
        
        .bubble { position: absolute; bottom: 60px; background: #ffd700; color: #1a1a1a; padding: 8px 15px; border-radius: 15px; font-size: 16px; font-weight: bold; opacity: 0; border: 2px solid #1a1a1a; pointer-events: none; z-index: 200; white-space: nowrap; }
        .bubble.show { animation: pop-fade 2.5s ease-out forwards; }
        @keyframes pop-fade { 
            0% { transform: scale(0) translateY(10px); opacity: 0; } 
            10% { transform: scale(1.2) translateY(0); opacity: 1; } 
            20% { transform: scale(1); opacity: 1; }
            80% { transform: scale(1); opacity: 1; } 
            100% { transform: scale(0.8); opacity: 0; } 
        }
        
        .stamp-area { margin-top: 20px; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .stamp-btn { width: auto; padding: 10px 15px; background: #ffd700; color: #1a1a1a; border: 2px solid #1a1a1a; white-space: nowrap; font-size: 14px; }
        
        #answer-display { font-size: 36px; font-weight: bold; min-height: 120px; display: flex; align-items: center; justify-content: center; }
        .vote-item { background: #fff; margin: 15px 0; padding: 20px; border-radius: 50px; cursor: pointer; border: 2px solid #1a1a1a; width: 100%; display: block; font-size: 20px; }
        .result-item { text-align: left; padding: 15px; border-bottom: 2px solid #eee; font-size: 20px; font-weight: bold; }
        
        .mvp-container { background: #1a1a1a; color: #ffd700; padding: 20px; border-radius: 20px; margin-bottom: 30px; border: 4px solid #ffd700; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .mvp-label { font-size: 14px; font-weight: bold; color: #fff; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        .mvp-odai { font-size: 14px; color: #fff; background: rgba(255,255,255,0.1); padding: 8px; border-radius: 10px; margin-bottom: 10px; }
        .mvp-answer { font-size: 28px; font-weight: bold; margin: 10px 0; line-height: 1.2; }
        .mvp-author { font-size: 16px; opacity: 0.9; }

        .footer-text { margin-top: 40px; font-size: 12px; color: #999; line-height: 1.8; }
        .footer-link { color: #999; text-decoration: none; margin: 0 5px; transition: 0.2s; }
        .footer-link:hover { color: #1a1a1a; text-decoration: underline; }

        .share-btn { background: #1a1a1a; color: #ffd700; border: 2px solid #ffd700; margin-bottom: 20px; }

        select:disabled { opacity: 0.8; color: #1a1a1a; cursor: default; }
    </style>
</head>
<body>

    <div id="screen-home" class="screen active">
        <img src="Logo.png" alt="with!大喜利" class="main-logo">
        <input type="text" id="name-input" placeholder="名前を入力（10文字まで）" maxlength="10">
        <p style="font-weight: bold;">アイコンを選択:</p>
        <div class="icon-selector">
            <div class="icon-option selected" onclick="selectIcon('🐱', this)">🐱</div>
            <div class="icon-option" onclick="selectIcon('🐶', this)">🐶</div>
            <div class="icon-option" onclick="selectIcon('🦊', this)">🦊</div>
            <div class="icon-option" onclick="selectIcon('🐈', this)">🐈</div>
        </div>
        <button onclick="createRoom()">新しい部屋を作る</button>
        <hr style="border: 0; border-top: 2px solid #eee; margin: 30px 0;">
        <input type="text" id="room-input" placeholder="5桁のコードを入力">
        <button onclick="joinRoom()">部屋に入る</button>
        <div class="footer-text">
            © 2026 with!大喜利<br>
            <a href="terms.html" class="footer-link">利用規約</a> | 
            <a href="privacy.html" class="footer-link">プライバシーポリシー</a> | 
            <a href="QA.html" class="footer-link">よくある質問</a> | 
            <a href="https://docs.google.com/forms/d/e/1FAIpQLSerejBEpNYMoTBTU036IRCy5PAKB6ekz9HhycDnFnNl-SsagQ/viewform?usp=preview" class="footer-link" target="_blank">お問い合わせ</a>
        </div>
    </div>

    <div id="screen-wait" class="screen">
        <h1>待機室</h1>
        <p>
            ルームコード: 
            <span id="display-code" style="font-size: 24px; font-weight: bold; cursor: pointer; background: #eee; padding: 2px 10px; border-radius: 5px;" onclick="toggleRoomCode()">*****</span>
            <button id="copy-btn" class="copy-btn" onclick="copyRoomCode()">コピー</button>
        </p>
        <div style="font-weight: bold; margin-bottom: 10px; text-align: right;">
            参加中：<span id="user-counter">0/8</span>
        </div>
        <div class="user-list" id="user-list"></div>
        
        <div style="margin-top: 20px;">
            <button id="ready-btn" onclick="toggleReady()">準備完了！</button>
            <button id="start-btn-container" style="display:none; margin-top: 10px;" onclick="startGame()" disabled>ゲーム開始！</button>
            <button id="wait-exit-btn" class="exit-btn" onclick="exitGame()">退出する</button>
        </div>

        <div id="room-settings-area" style="display:none; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px;">
            <p id="settings-title" style="font-weight: bold; margin-bottom: 15px;">ルーム設定</p>
            
            <label style="font-weight: bold;">最大参加人数 (2〜8人):</label><br>
            <select id="max-users-select" onchange="updateRoomSettings('maxUsers', this.value)">
                <option value="2">2人</option>
                <option value="3">3人</option>
                <option value="4">4人</option>
                <option value="5">5人</option>
                <option value="6">6人</option>
                <option value="7">7人</option>
                <option value="8" selected>8人</option>
            </select><br>

            <label style="font-weight: bold;">回答時間:</label><br>
            <select id="time-select" onchange="updateRoomSettings('timeLimit', this.value)">
                <option value="30">30秒</option>
                <option value="60" selected>60秒</option>
                <option value="120">120秒</option>
            </select><br>
            
            <label style="font-weight: bold;">お題の数 (1〜10問):</label><br>
            <select id="round-select" onchange="updateRoomSettings('totalRounds', this.value)">
            </select>
            
            <p id="start-condition-msg" style="color:#1a1a1a; font-size: 14px; margin-top: 10px;">全員が準備完了になると開始できます</p>
        </div>
        <p id="guest-msg" style="display:none; color: #666; margin-top: 20px;">ホストが設定を変更中...</p>
    </div>

    <div id="screen-playing" class="screen">
        <div style="display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px;">
            <span id="round-display">第 - ラウンド</span>
            <span id="timer-display" style="color: red;">残り --秒</span>
        </div>
        <div class="odai-box" id="current-odai">お題を取得中...</div>
        <input type="text" id="my-answer" placeholder="ボケを入力！（100文字まで）" maxlength="100">
        <button id="submit-btn" onclick="submitAnswer()">回答を送信</button>
        <p id="playing-wait-msg" style="display:none; font-weight: bold; color: #666;">送信完了！他の人を待っています...</p>
        <div class="stamp-area">
            <button class="stamp-btn" onclick="sendStamp('W')">W</button>
            <button class="stamp-btn" onclick="sendStamp('草')">草</button>
            <button class="stamp-btn" onclick="sendStamp('！？')">！？</button>
            <button class="stamp-btn" onclick="sendStamp('難しい…')">難しい…</button>
            <button class="stamp-btn" onclick="sendStamp('よゆー！')">よゆー！</button>
        </div>
    </div>

    <div id="screen-revealing" class="screen">
        <h1>発表！</h1>
        <div id="revealing-odai" class="sub-odai-box"></div>
        <div id="answer-display">...</div>
        <p id="author-name"></p>
        <button id="next-reveal-btn" style="display:none; width: auto; padding: 10px 20px;" onclick="nextReveal()">次の回答へ</button>
        <div class="stamp-area">
            <button class="stamp-btn" onclick="sendStamp('W')">W</button>
            <button class="stamp-btn" onclick="sendStamp('草')">草</button>
            <button class="stamp-btn" onclick="sendStamp('！？')">！？</button>
            <button class="stamp-btn" onclick="sendStamp('うまい！')">うまい！</button>
            <button class="stamp-btn" onclick="sendStamp('8888')">8888</button>
        </div>
    </div>

    <div id="screen-voting" class="screen">
        <h1>投票！</h1>
        <div id="voting-odai" class="sub-odai-box"></div>
        <p>一番面白いと思った回答を選んでください</p>
        <div id="vote-list"></div>
        <p id="vote-wait-msg" style="display:none;">全員の投票を待っています...</p>
    </div>

    <div id="screen-result" class="screen">
        <h1>最終結果発表</h1>
        <div id="mvp-area" class="mvp-container">
            <div class="mvp-label">🏆 今回のMVP 🏆</div>
            <div id="mvp-odai" class="mvp-odai">お題: ...</div>
            <div id="mvp-answer" class="mvp-answer">...</div>
            <div id="mvp-author" class="mvp-author">...</div>
        </div>
        <div id="result-list"></div>
        
        <button class="share-btn" onclick="shareToX()">結果をXにシェア</button>
        
        <button id="back-to-wait-btn" onclick="goBackToWait()">待機室に戻る</button>
        <button id="exit-game-btn" class="exit-btn" onclick="exitGame()">ゲームをやめる</button>
        <div class="stamp-area">
            <button class="stamp-btn" onclick="sendStamp('W')">W</button>
            <button class="stamp-btn" onclick="sendStamp('草')">草</button>
            <button class="stamp-btn" onclick="sendStamp('！？')">！？</button>
            <button class="stamp-btn" onclick="sendStamp('おめでとう')">おめでとう</button>
            <button class="stamp-btn" onclick="sendStamp('ありがとう')">ありがとう</button>
        </div>
    </div>

    <div id="copy-toast">コピー完了</div>
    <div id="bottom-users" class="bottom-users" style="display:none;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, updateDoc, arrayUnion, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { odaiList } from "./odai.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCUbcnNw3vd9_HN5FDOPPuEClW6XiUfKN8",
            authDomain: "with-oogiri.firebaseapp.com",
            projectId: "with-oogiri",
            storageBucket: "with-oogiri.firebasestorage.app",
            messagingSenderId: "673839786410",
            appId: "1:673839786410:web:b0fe06aeaa5cdbbae6a3d3",
            measurementId: "G-PLCZY3D7HT"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let roomCode = "", myName = "", myId = "", myIcon = "🐱", isHost = false, hasVoted = false, latestRoomData = null, timerInterval = null;
        let currentLocalScreen = "home";
        let lastKnownReactionTimes = {}; 
        let isProcessingAction = false; 

        const roundSelect = document.getElementById("round-select");
        for(let i=1; i<=10; i++) {
            let opt = document.createElement("option");
            opt.value = i; opt.innerText = `${i}問`;
            if(i === 3) opt.selected = true;
            roundSelect.appendChild(opt);
        }

        function generateId() { return Math.random().toString(36).substring(2, 10); }

        function pickUniqueOdai(usedIndices) {
            let availableIndices = odaiList.map((_, i) => i).filter(i => !usedIndices.includes(i));
            if (availableIndices.length === 0) {
                availableIndices = odaiList.map((_, i) => i);
                usedIndices = [];
            }
            const randomIndex = availableIndices[Math.floor(Math.random() * availableIndices.length)];
            return { index: randomIndex, text: odaiList[randomIndex], newUsedIndices: [...usedIndices, randomIndex] };
        }

        window.selectIcon = (icon, el) => {
            myIcon = icon;
            const container = el.parentElement;
            container.querySelectorAll('.icon-option').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
        };

        window.toggleRoomCode = () => {
            const display = document.getElementById("display-code");
            display.innerText = (display.innerText === "*****") ? roomCode : "*****";
            display.style.background = (display.innerText === "*****") ? "#eee" : "transparent";
        };

        window.copyRoomCode = () => {
            if (!roomCode) return;
            navigator.clipboard.writeText(roomCode).then(() => {
                const toast = document.getElementById("copy-toast");
                toast.className = "show";
                setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 2000);
            });
        };

        window.addEventListener("beforeunload", (e) => {
            if (roomCode && myId && latestRoomData) {
                const updatedUsers = latestRoomData.users.map(u => {
                    if (u.id === myId) return { ...u, isExited: true, isReady: false };
                    return u;
                });
                updateDoc(doc(db, "rooms", roomCode), { users: updatedUsers });
            }
        });

        window.createRoom = async () => {
            roomCode = Math.floor(10000 + Math.random() * 90000).toString();
            myName = document.getElementById("name-input").value.substring(0, 10) || "名無し";
            myId = generateId();
            isHost = true;
            currentLocalScreen = "wait";
            await setDoc(doc(db, "rooms", roomCode), {
                status: "waiting", 
                users: [{ id: myId, name: myName, icon: myIcon, isReady: false, lastReaction: "", reactionTime: 0, totalScore: 0, isExited: false }], 
                hostId: myId, originalHostId: myId,
                odai: "", usedOdaiIndices: [], answers: [], revealIndex: 0, timeLeft: 60, voteCount: 0,
                currentRound: 0, totalRounds: 3,
                maxUsers: 8, timeLimit: 60, allAnswersHistory: []
            });
            setupRoomListener();
        };

        window.updateRoomSettings = async (field, val) => {
            if (!isHost) return;
            const update = {};
            update[field] = parseInt(val);
            await updateDoc(doc(db, "rooms", roomCode), update);
        };

        window.joinRoom = async () => {
            roomCode = document.getElementById("room-input").value;
            if(!roomCode) return;
            const roomRef = doc(db, "rooms", roomCode);
            const docSnap = await getDoc(roomRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                const activeUsers = data.users.filter(u => !u.isExited);
                if (activeUsers.length >= (data.maxUsers || 8)) { alert("満員です"); return; }
                if (data.status !== "waiting") { alert("進行中です"); return; }
            } else { alert("部屋がありません"); return; }
            myName = document.getElementById("name-input").value.substring(0, 10) || "ゲスト";
            myId = generateId();
            isHost = false;
            currentLocalScreen = "wait";
            await updateDoc(roomRef, { users: arrayUnion({ id: myId, name: myName, icon: myIcon, isReady: false, lastReaction: "", reactionTime: 0, totalScore: 0, isExited: false }) });
            setupRoomListener();
        };

        window.toggleReady = async () => {
            const newUsers = latestRoomData.users.map(u => u.id === myId ? { ...u, isReady: !u.isReady } : u);
            await updateDoc(doc(db, "rooms", roomCode), { users: newUsers });
        };

        function setupRoomListener() {
            onSnapshot(doc(db, "rooms", roomCode), async (docSnap) => {
                if (!docSnap.exists()) return;
                latestRoomData = docSnap.data();

                const activeUsers = latestRoomData.users.filter(u => !u.isExited);
                const originalHostActive = latestRoomData.users.find(u => u.id === latestRoomData.originalHostId && !u.isExited);
                const currentHostActive = latestRoomData.users.find(u => u.id === latestRoomData.hostId && !u.isExited);

                if (originalHostActive) {
                    if (latestRoomData.hostId !== latestRoomData.originalHostId) {
                        await updateDoc(doc(db, "rooms", roomCode), { hostId: latestRoomData.originalHostId });
                    }
                } else if (!currentHostActive && activeUsers.length > 0) {
                    await updateDoc(doc(db, "rooms", roomCode), { hostId: activeUsers[0].id });
                }

                isHost = (latestRoomData.hostId === myId);

                if (currentLocalScreen === "result") { } 
                else if (["playing", "revealing", "voting"].includes(latestRoomData.status)) {
                    currentLocalScreen = latestRoomData.status;
                }
                else if (latestRoomData.status === "result") {
                    currentLocalScreen = "result";
                }
                else if (latestRoomData.status === "waiting") {
                    if (currentLocalScreen !== "home") {
                        currentLocalScreen = "wait";
                    }
                }

                updateUI(latestRoomData);
            });
        }

        function updateUI(data) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const activeUsers = data.users.filter(u => !u.isExited);
            const bottomBar = document.getElementById("bottom-users");
            
            if (currentLocalScreen !== "home") {
                bottomBar.style.display = "flex";
                const currentIconCount = bottomBar.querySelectorAll('.user-icon-stack').length;
                if (currentIconCount !== activeUsers.length) {
                    bottomBar.innerHTML = activeUsers.map(u => `
                        <div class="user-icon-stack" id="stack-${u.id}">
                            <div class="bubble" id="bubble-${u.id}"></div>
                            <div class="icon">${u.icon}</div>
                            <div>${u.name.substring(0, 10)}${u.id === myId ? '<br>(あなた)' : ''}</div>
                        </div>
                    `).join("");
                }

                data.users.forEach(u => {
                    const bubble = document.getElementById(`bubble-${u.id}`);
                    if (bubble && u.reactionTime && u.reactionTime !== lastKnownReactionTimes[u.id]) {
                        lastKnownReactionTimes[u.id] = u.reactionTime;
                        bubble.innerText = u.lastReaction;
                        bubble.classList.remove("show");
                        void bubble.offsetWidth; 
                        bubble.classList.add("show");
                    }
                });
            } else { bottomBar.style.display = "none"; }

            const activeScreen = document.getElementById(`screen-${currentLocalScreen}`);
            if (activeScreen) activeScreen.classList.add("active");

            if (currentLocalScreen === "wait") {
                isProcessingAction = false; 
                const limit = data.maxUsers || 8;
                document.getElementById("user-counter").innerText = `${activeUsers.length}/${limit}`;
                const me = data.users.find(u => u.id === myId);
                const readyBtn = document.getElementById("ready-btn");
                if (me) {
                    readyBtn.innerText = me.isReady ? "準備解除" : "準備完了！";
                    readyBtn.style.background = me.isReady ? "#ccc" : "#ffd700";
                    readyBtn.style.color = "#1a1a1a";
                }
                document.getElementById("user-list").innerHTML = activeUsers.map(u => `
                    <div class="user-entry">
                        <span>${u.icon} ${u.name.substring(0, 10)}${u.id === myId ? ' (あなた)' : ''} ${u.id === data.hostId ? '👑' : ''}</span>
                        <span class="status-badge ${u.isReady ? 'status-ready' : 'status-wait'}">${u.isReady ? '準備完了' : '待機中'}</span>
                    </div>
                `).join("");
                
                const startBtn = document.getElementById("start-btn-container");
                const settingsArea = document.getElementById("room-settings-area");
                
                settingsArea.style.display = "block"; 
                startBtn.style.display = isHost ? "inline-block" : "none";
                document.getElementById("guest-msg").style.display = isHost ? "none" : "block";
                
                const maxSelect = document.getElementById("max-users-select");
                const timeSelect = document.getElementById("time-select");
                const rSelect = document.getElementById("round-select");
                
                maxSelect.value = data.maxUsers || 8;
                timeSelect.value = data.timeLimit || 60;
                rSelect.value = data.totalRounds || 3;
                
                maxSelect.disabled = !isHost;
                timeSelect.disabled = !isHost;
                rSelect.disabled = !isHost;
                
                document.getElementById("settings-title").innerText = isHost ? "ホスト設定" : "ルーム設定 (ホストのみ変更可)";

                if (isHost) {
                    const allReady = activeUsers.length >= 2 && activeUsers.every(u => u.isReady);
                    startBtn.disabled = !allReady;
                }
            } 
            else if (currentLocalScreen === "playing") {
                isProcessingAction = false; 
                hasVoted = false;
                document.getElementById("round-display").innerText = `第 ${data.currentRound} / ${data.totalRounds} ラウンド`;
                document.getElementById("current-odai").innerText = data.odai;
                document.getElementById("timer-display").innerText = `残り ${data.timeLeft}秒`;
                
                const sent = data.answers.some(a => a.userId === myId);
                const subBtn = document.getElementById("submit-btn");
                const waitMsg = document.getElementById("playing-wait-msg");

                subBtn.disabled = sent;
                waitMsg.style.display = sent ? "block" : "none";

                if (isHost && (data.answers.length >= activeUsers.length || data.timeLeft <= 0)) goToReveal();
            } 
            else if (currentLocalScreen === "revealing") {
                document.getElementById("revealing-odai").innerText = `お題：${data.odai}`;
                const ans = data.answers && data.answers.length > 0 ? data.answers[data.revealIndex] : null;
                if (ans) {
                    document.getElementById("answer-display").innerText = ans.text;
                    document.getElementById("author-name").innerText = `回答者: ${ans.userName}`;
                    document.getElementById("next-reveal-btn").style.display = isHost ? "block" : "none";
                } else if (isHost) {
                    updateDoc(doc(db, "rooms", roomCode), { status: "voting" });
                }
            } 
            else if (currentLocalScreen === "voting") {
                isProcessingAction = false; 
                document.getElementById("voting-odai").innerText = `お題：${data.odai}`;
                renderVoteList(data);
                if (isHost && data.voteCount >= activeUsers.length) processVoteEnd(data);
            } 
            else if (currentLocalScreen === "result") {
                renderFinalResults(data);
            }
        }

        async function processVoteEnd(data) {
            if (!isHost) return;
            const updatedUsers = data.users.map(u => {
                const ans = data.answers.find(a => a.userId === u.id);
                return { ...u, totalScore: (u.totalScore || 0) + (ans ? ans.votes : 0) };
            });
            const updatedHistory = [...(data.allAnswersHistory || []), ...data.answers.map(a => ({...a, odai: data.odai}))];
            if (data.currentRound < data.totalRounds) {
                const nextOdai = pickUniqueOdai(data.usedOdaiIndices || []);
                await updateDoc(doc(db, "rooms", roomCode), {
                    status: "playing", users: updatedUsers, currentRound: data.currentRound + 1,
                    answers: [], revealIndex: 0, voteCount: 0, timeLeft: data.timeLimit,
                    odai: nextOdai.text, usedOdaiIndices: nextOdai.newUsedIndices,
                    allAnswersHistory: updatedHistory
                });
                startTimer(data.timeLimit);
            } else {
                await updateDoc(doc(db, "rooms", roomCode), { status: "result", users: updatedUsers, allAnswersHistory: updatedHistory });
            }
        }

        window.startGame = async () => {
            if (!isHost) return;
            const participants = latestRoomData.users.filter(u => !u.isExited).map(u => ({ ...u, isReady: false, totalScore: 0 }));
            const nextOdai = pickUniqueOdai([]);
            await updateDoc(doc(db, "rooms", roomCode), {
                status: "playing", users: participants, currentRound: 1, 
                answers: [], revealIndex: 0, timeLeft: latestRoomData.timeLimit, voteCount: 0,
                odai: nextOdai.text, usedOdaiIndices: nextOdai.newUsedIndices,
                allAnswersHistory: []
            });
            startTimer(latestRoomData.timeLimit);
        };

        function startTimer(duration) {
            if (timerInterval) clearInterval(timerInterval);
            let time = duration;
            timerInterval = setInterval(() => {
                time--;
                if (isHost) updateDoc(doc(db, "rooms", roomCode), { timeLeft: time });
                if (time <= 0) { clearInterval(timerInterval); if (isHost) goToReveal(); }
            }, 1000);
        }

        window.submitAnswer = async () => {
            if (isProcessingAction) return;
            const text = document.getElementById("my-answer").value;
            if(!text) return;
            isProcessingAction = true;
            document.getElementById("submit-btn").disabled = true;
            await updateDoc(doc(db, "rooms", roomCode), { answers: arrayUnion({ userId: myId, userName: myName, text: text, votes: 0, reactions: 0 }) });
            document.getElementById("my-answer").value = "";
        };

        async function goToReveal() {
            if (timerInterval) clearInterval(timerInterval);
            if (!isHost) return;
            const currentAnswers = latestRoomData.answers || [];
            if (currentAnswers.length === 0) {
                processVoteEnd(latestRoomData);
            } else {
                await updateDoc(doc(db, "rooms", roomCode), { status: "revealing", revealIndex: 0 });
            }
        }

        window.nextReveal = async () => { await updateDoc(doc(db, "rooms", roomCode), { revealIndex: latestRoomData.revealIndex + 1 }); };

        function renderVoteList(data) {
            const list = document.getElementById("vote-list");
            list.innerHTML = "";
            const activeUsers = data.users.filter(u => !u.isExited);
            const others = data.answers.filter(a => a.userId !== myId && activeUsers.some(u => u.id === a.userId));
            if (others.length === 0 || hasVoted) {
                if (!hasVoted && others.length === 0) { hasVoted = true; updateDoc(doc(db, "rooms", roomCode), { voteCount: data.voteCount + 1 }); }
                document.getElementById("vote-wait-msg").style.display = "block";
                return;
            }
            document.getElementById("vote-wait-msg").style.display = "none";
            others.forEach(ans => {
                const btn = document.createElement("button"); 
                btn.className = "vote-item"; 
                btn.innerText = ans.text;
                if (isProcessingAction) btn.disabled = true;
                btn.onclick = async () => {
                    if (isProcessingAction) return;
                    isProcessingAction = true;
                    hasVoted = true;
                    document.querySelectorAll('.vote-item').forEach(b => b.disabled = true);
                    const newAns = data.answers.map(a => a.userId === ans.userId ? {...a, votes: a.votes + 1} : a);
                    await updateDoc(doc(db, "rooms", roomCode), { answers: newAns, voteCount: data.voteCount + 1 });
                };
                list.appendChild(btn);
            });
        }

        function renderFinalResults(data) {
            const list = document.getElementById("result-list");
            const sorted = [...data.users].sort((a,b) => (b.totalScore || 0) - (a.totalScore || 0));
            list.innerHTML = sorted.map((u, i) => `<div class="result-item"><strong>${i+1}位 (${u.totalScore || 0}pt):</strong> ${u.icon} ${u.name.substring(0, 10)}${u.id === myId ? ' (あなた)' : ''} ${u.isExited ? '<small>(退出済)</small>' : ''}</div>`).join("");

            const history = data.allAnswersHistory || [];
            if (history.length > 0) {
                const maxVotes = Math.max(...history.map(a => a.votes));
                if (maxVotes > 0) {
                    const voteCandidates = history.filter(a => a.votes === maxVotes);
                    const maxReactions = Math.max(...voteCandidates.map(a => a.reactions || 0));
                    const finalists = voteCandidates.filter(a => (a.reactions || 0) === maxReactions);

                    // 1. 得票数(済) 2. リアクション数(済) 3. 参加順で決定
                    // 参加順は data.users の並び順（入室順）を基準とする
                    let winner = finalists[0];
                    if (finalists.length > 1) {
                        const userOrder = data.users.map(u => u.id);
                        finalists.sort((a, b) => {
                            const indexA = userOrder.indexOf(a.userId);
                            const indexB = userOrder.indexOf(b.userId);
                            return indexA - indexB;
                        });
                        winner = finalists[0];
                    }

                    document.getElementById("mvp-area").style.display = "block";
                    document.getElementById("mvp-odai").innerText = `お題: ${winner.odai}`;
                    document.getElementById("mvp-answer").innerText = `「${winner.text}」`;
                    document.getElementById("mvp-author").innerText = `${winner.userName} （${winner.votes}票 / ${winner.reactions || 0}反応）`;
                } else { document.getElementById("mvp-area").style.display = "none"; }
            } else { document.getElementById("mvp-area").style.display = "none"; }
        }

        // Xシェア機能（リザルト画面の情報を引用 + GitHub PagesのURLを使用）
        window.shareToX = () => {
            const mvpAnswer = document.getElementById("mvp-answer").innerText;
            const mvpOdai = document.getElementById("mvp-odai").innerText;

            let shareText = `【with!大喜利】結果発表！\n`;
            if (mvpAnswer && mvpAnswer !== "...") {
                shareText += `🏆今回のMVP回答：${mvpAnswer}\n`;
                shareText += `（${mvpOdai}）\n\n`;
            }
            shareText += `#with大喜利\n`;

            const xUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(shareText)}&url=${encodeURIComponent("https://zetsubouinu.github.io/ZetsubouInu/")}`;
            window.open(xUrl, '_blank');
        };

        window.goBackToWait = async () => {
            currentLocalScreen = "wait";
            updateUI(latestRoomData);
            const updated = latestRoomData.users.map(u => u.id === myId ? {...u, isReady: false, isExited: false} : u);
            await updateDoc(doc(db, "rooms", roomCode), { users: updated, status: "waiting" });
        };

        window.exitGame = async () => {
            if (!latestRoomData) {
                location.reload();
                return;
            }
            const updatedUsers = latestRoomData.users.map(u => u.id === myId ? { ...u, isExited: true, isReady: false } : u);
            await updateDoc(doc(db, "rooms", roomCode), { users: updatedUsers });
            
            roomCode = "";
            myId = "";
            isHost = false;
            currentLocalScreen = "home";
            location.reload(); 
        };

        window.sendStamp = async (type) => {
            const newUsers = latestRoomData.users.map(u => u.id === myId ? { ...u, lastReaction: type, reactionTime: Date.now() } : u);
            const updateFields = { users: newUsers };
            if (latestRoomData.status === "revealing") {
                const currentAns = latestRoomData.answers[latestRoomData.revealIndex];
                if (currentAns && currentAns.userId !== myId) {
                    const newAnswers = latestRoomData.answers.map((a, i) => {
                        if (i === latestRoomData.revealIndex) {
                            return { ...a, reactions: (a.reactions || 0) + 1 };
                        }
                        return a;
                    });
                    updateFields.answers = newAnswers;
                }
            }
            await updateDoc(doc(db, "rooms", roomCode), updateFields);
        };
    </script>
</body>
